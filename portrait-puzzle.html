<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portrait Puzzle</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // Inline SVG Icons to replace lucide-react
    const Icon = ({ d, children, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
        {d ? <path d={d} /> : children}
      </svg>
    );

    const Icons = {
      Search: (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></Icon>,
      ImageIcon: (p) => <Icon {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Icon>,
      Users: (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>,
      Settings: (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>,
      Play: (p) => <Icon {...p}><polygon points="6 3 20 12 6 21 6 3"/></Icon>,
      ArrowLeft: (p) => <Icon {...p}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></Icon>,
      ZoomOut: (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="8" x2="14" y1="11" y2="11"/></Icon>,
      ZoomIn: (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></Icon>,
      CheckCircle2: (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>,
      RefreshCw: (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>
    };

    const DEFAULT_IDS = [
      "ALXNDRA", "BRNDONM", "CHRLIES", "DANIELL", "EVANSTN",
      "FRNKLIN", "GRGORYP", "HARRISN", "ISABELL", "JONATHN",
      "KATHRYN", "LEONARD", "MCHAELL", "NATHANL", "OLIVIAW",
      "PATRICK", "QUINTIN", "RICHARD", "SAMANTH", "TIMOTHY",
      "URSULAA", "VICTORI", "WILLIAM", "XAVIERZ", "YASMINE",
      "ZACHARY", "AMANDAB", "BENJMNR", "CAMERON", "DERRICK",
      "ELEANOR", "FELICIA", "GABRIEL", "HEATHER", "IANTHOM",
      "JACQUEL", "KENDALL", "LAWRENC", "MADISON", "NICHOLS",
      "PENELOP", "ROBERTO", "STEPHAN", "TERRENC", "VALERIE",
      "WESLEYC", "YOLANDA", "ZIONMAX"
    ].join('\n');

    const DEFAULT_TEMPLATE = "https://api.dicebear.com/7.x/avataaars/svg?seed={id}";

    function App() {
      const [gameState, setGameState] = useState('setup');
      const [urlTemplate, setUrlTemplate] = useState(DEFAULT_TEMPLATE);
      const [employeeIdsStr, setEmployeeIdsStr] = useState(DEFAULT_IDS);
      const [gridSize, setGridSize] = useState(25);
      
      const [portraits, setPortraits] = useState([]);
      const [targetId, setTargetId] = useState('');
      const [startTime, setStartTime] = useState(0);
      const [endTime, setEndTime] = useState(0);
      const [currentTime, setCurrentTime] = useState(0);
      
      const [zoom, setZoom] = useState(1);
      const [wrongClicks, setWrongClicks] = useState([]);
      
      const containerRef = useRef(null);
      const [isDragging, setIsDragging] = useState(false);
      const dragStart = useRef({ x: 0, y: 0, scrollLeft: 0, scrollTop: 0 });
      const hasDragged = useRef(false);

      useEffect(() => {
        if (gameState === 'playing') {
          const interval = setInterval(() => setCurrentTime(Date.now()), 1000);
          return () => clearInterval(interval);
        }
      }, [gameState]);

      useEffect(() => {
        if (wrongClicks.length > 0) {
          const timer = setTimeout(() => {
            setWrongClicks(prev => prev.slice(1));
          }, 1000);
          return () => clearTimeout(timer);
        }
      }, [wrongClicks]);

      const generateBoard = () => {
        const ids = Array.from(new Set(employeeIdsStr.split(/[\n,]+/).map(id => id.trim()).filter(Boolean)));
        if (ids.length < 2) {
          alert("Please provide at least 2 unique employee IDs.");
          return;
        }

        const target = ids[Math.floor(Math.random() * ids.length)];
        const distractors = ids.filter(id => id !== target);
        
        const newPortraits = [];
        const cellSize = 80;
        
        const targetRow = Math.floor(Math.random() * gridSize);
        const targetCol = Math.floor(Math.random() * gridSize);
        
        for (let row = 0; row < gridSize; row++) {
          for (let col = 0; col < gridSize; col++) {
            const isTarget = row === targetRow && col === targetCol;
            const employeeId = isTarget ? target : distractors[Math.floor(Math.random() * distractors.length)];
            
            newPortraits.push({
              id: `${row}-${col}`,
              employeeId,
              isTarget,
              x: col * cellSize + Math.random() * 40 - 20,
              y: row * cellSize + Math.random() * 40 - 20,
              rotation: Math.random() * 60 - 30,
              zIndex: Math.floor(Math.random() * 100) + (isTarget ? 10 : 0),
            });
          }
        }
        
        newPortraits.sort(() => Math.random() - 0.5);
        
        setPortraits(newPortraits);
        setTargetId(target);
        setStartTime(Date.now());
        setCurrentTime(Date.now());
        setGameState('playing');
        setZoom(1);
        setWrongClicks([]);
        
        setTimeout(() => {
          if (containerRef.current) {
            const boardWidth = gridSize * cellSize;
            containerRef.current.scrollLeft = (boardWidth - containerRef.current.clientWidth) / 2;
            containerRef.current.scrollTop = (boardWidth - containerRef.current.clientHeight) / 2;
          }
        }, 100);
      };

      const handlePointerDown = (e) => {
        if (e.button !== 0) return;
        setIsDragging(true);
        hasDragged.current = false;
        dragStart.current = {
          x: e.clientX,
          y: e.clientY,
          scrollLeft: containerRef.current?.scrollLeft || 0,
          scrollTop: containerRef.current?.scrollTop || 0,
        };
        e.currentTarget.setPointerCapture(e.pointerId);
      };

      const handlePointerMove = (e) => {
        if (!isDragging || !containerRef.current) return;
        const dx = e.clientX - dragStart.current.x;
        const dy = e.clientY - dragStart.current.y;
        
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
          hasDragged.current = true;
        }
        
        containerRef.current.scrollLeft = dragStart.current.scrollLeft - dx;
        containerRef.current.scrollTop = dragStart.current.scrollTop - dy;
      };

      const handlePointerUp = (e) => {
        setIsDragging(false);
        e.currentTarget.releasePointerCapture(e.pointerId);
      };

      const handlePortraitClick = (isTarget, e) => {
        if (hasDragged.current) {
          e.stopPropagation();
          return;
        }
        
        if (isTarget) {
          setGameState('found');
          setEndTime(Date.now());
        } else {
          const rect = containerRef.current?.getBoundingClientRect();
          if (rect) {
            const x = (e.clientX - rect.left + (containerRef.current?.scrollLeft || 0)) / zoom;
            const y = (e.clientY - rect.top + (containerRef.current?.scrollTop || 0)) / zoom;
            setWrongClicks(prev => [...prev, { id: Date.now(), x, y }]);
          }
        }
      };

      const formatTime = (ms) => {
        const totalSeconds = Math.floor(Math.max(0, ms) / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      };

      if (gameState === 'setup') {
        return (
          <div className="min-h-screen bg-stone-100 flex items-center justify-center p-4 font-sans">
            <div className="bg-white rounded-3xl shadow-xl p-8 max-w-2xl w-full border border-stone-200">
              <div className="flex items-center gap-4 mb-6">
                <div className="bg-indigo-100 p-3 rounded-2xl">
                  <Icons.Search className="w-8 h-8 text-indigo-600" />
                </div>
                <div>
                  <h1 className="text-3xl font-bold text-stone-800">Portrait Puzzle</h1>
                  <p className="text-stone-500 font-medium">A Where's Waldo style zoom game</p>
                </div>
              </div>

              <div className="space-y-6">
                <div>
                  <label className="flex items-center gap-2 text-sm font-semibold text-stone-700 mb-2">
                    <Icons.ImageIcon className="w-4 h-4" />
                    Image URL Template
                  </label>
                  <input
                    type="text"
                    value={urlTemplate}
                    onChange={(e) => setUrlTemplate(e.target.value)}
                    className="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all font-mono text-sm"
                    placeholder="https://example.com/profiles/{id}.jpg"
                  />
                  <p className="text-xs text-stone-500 mt-2">
                    Use <code className="bg-stone-100 px-1 py-0.5 rounded font-bold text-stone-700">{"{id}"}</code> where the 7-letter employee code should go.
                  </p>
                </div>

                <div>
                  <label className="flex items-center gap-2 text-sm font-semibold text-stone-700 mb-2">
                    <Icons.Users className="w-4 h-4" />
                    Employee IDs (7-letter codes)
                  </label>
                  <textarea
                    value={employeeIdsStr}
                    onChange={(e) => setEmployeeIdsStr(e.target.value)}
                    className="w-full h-40 px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all font-mono text-sm resize-none"
                    placeholder="ABCDEFG\nHIJKLMN"
                  />
                  <p className="text-xs text-stone-500 mt-2">Enter one ID per line or separate with commas.</p>
                </div>

                <div>
                  <label className="flex items-center justify-between text-sm font-semibold text-stone-700 mb-2">
                    <span className="flex items-center gap-2"><Icons.Settings className="w-4 h-4" /> Difficulty (Grid Size)</span>
                    <span className="text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">{gridSize}x{gridSize} ({gridSize * gridSize} portraits)</span>
                  </label>
                  <input
                    type="range"
                    min="10"
                    max="50"
                    step="5"
                    value={gridSize}
                    onChange={(e) => setGridSize(parseInt(e.target.value))}
                    className="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                  />
                </div>

                <button
                  onClick={generateBoard}
                  className="w-full bg-indigo-600 text-white font-bold text-lg py-4 rounded-xl hover:bg-indigo-700 active:bg-indigo-800 transition-colors flex items-center justify-center gap-2 shadow-lg shadow-indigo-200"
                >
                  <Icons.Play className="w-6 h-6 fill-current" />
                  Start Game
                </button>
              </div>
            </div>
          </div>
        );
      }

      const boardWidth = gridSize * 80;

      return (
        <div className="h-screen w-screen flex flex-col bg-stone-100 font-sans overflow-hidden">
          <div className="h-20 bg-white border-b border-stone-200 flex items-center justify-between px-4 sm:px-6 shadow-sm z-10 shrink-0">
            <div className="flex items-center gap-2 sm:gap-4">
              <button onClick={() => setGameState('setup')} className="p-2 hover:bg-stone-100 rounded-full transition-colors" title="Back to Setup">
                <Icons.ArrowLeft className="w-6 h-6 text-stone-600" />
              </button>
              <div className="flex items-center gap-3 bg-indigo-50 px-3 sm:px-4 py-2 rounded-xl border border-indigo-100">
                <span className="font-semibold text-indigo-900 hidden sm:inline">Find:</span>
                <div className="w-10 h-10 rounded-full overflow-hidden border-2 border-indigo-200 bg-white shrink-0">
                  <img src={urlTemplate.replace('{id}', targetId)} className="w-full h-full object-cover" alt="Target" />
                </div>
                <span className="font-mono font-bold text-indigo-700">{targetId}</span>
              </div>
            </div>

            <div className="flex items-center gap-4 sm:gap-6">
              <div className="text-xl sm:text-2xl font-mono font-bold text-stone-700 w-20 text-center">
                {formatTime((gameState === 'found' ? endTime : currentTime) - startTime)}
              </div>

              <div className="flex items-center gap-1 sm:gap-2 bg-stone-100 p-1 rounded-lg">
                <button onClick={() => setZoom(z => Math.max(0.2, z - 0.2))} className="p-1.5 hover:bg-white rounded-md shadow-sm active:bg-stone-200 transition-colors">
                  <Icons.ZoomOut className="w-5 h-5 text-stone-600" />
                </button>
                <span className="w-12 text-center font-medium text-stone-600 text-sm">{Math.round(zoom * 100)}%</span>
                <button onClick={() => setZoom(z => Math.min(3, z + 0.2))} className="p-1.5 hover:bg-white rounded-md shadow-sm active:bg-stone-200 transition-colors">
                  <Icons.ZoomIn className="w-5 h-5 text-stone-600" />
                </button>
              </div>
            </div>
          </div>

          <div
            ref={containerRef}
            className={`flex-1 overflow-auto relative ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
            onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onPointerLeave={handlePointerUp}
          >
            <div
              className="relative origin-top-left transition-transform duration-75 ease-out"
              style={{
                width: boardWidth,
                height: boardWidth,
                transform: `scale(${zoom})`,
                backgroundImage: `radial-gradient(#a8a29e 2px, transparent 2px)`,
                backgroundSize: '40px 40px',
                backgroundColor: '#e7e5e4'
              }}
            >
              {portraits.map(p => (
                <div
                  key={p.id}
                  className="absolute bg-white p-1.5 shadow-md border border-stone-300 hover:shadow-2xl hover:z-[999] transition-all duration-200"
                  style={{
                    left: p.x,
                    top: p.y,
                    width: 64,
                    height: 76,
                    transform: `rotate(${p.rotation}deg)`,
                    zIndex: p.zIndex,
                  }}
                  onClick={(e) => handlePortraitClick(p.isTarget, e)}
                >
                  <div className="w-full h-full bg-stone-100 overflow-hidden border border-stone-200">
                    <img
                      src={urlTemplate.replace('{id}', p.employeeId)}
                      className="w-full h-full object-cover pointer-events-none select-none"
                      alt="portrait"
                      loading="lazy"
                      draggable={false}
                    />
                  </div>
                </div>
              ))}

              {wrongClicks.map(wc => (
                <div
                  key={wc.id}
                  className="absolute text-red-500 font-black text-5xl pointer-events-none animate-ping z-[1000]"
                  style={{
                    left: wc.x,
                    top: wc.y,
                    transform: 'translate(-50%, -50%)'
                  }}
                >
                  X
                </div>
              ))}
            </div>
          </div>

          {gameState === 'found' && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-300">
              <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center border border-stone-200 animate-in zoom-in-95 duration-300">
                <div className="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6">
                  <Icons.CheckCircle2 className="w-12 h-12 text-emerald-500" />
                </div>
                <h2 className="text-4xl font-black text-stone-800 mb-2">Found 'em!</h2>
                <p className="text-stone-500 font-medium mb-8 text-lg">
                  You found <span className="font-mono font-bold text-indigo-600">{targetId}</span> in {formatTime(endTime - startTime)}.
                </p>
                
                <div className="flex gap-4 justify-center">
                  <button
                    onClick={() => setGameState('setup')}
                    className="px-6 py-3 rounded-xl font-bold text-stone-600 bg-stone-100 hover:bg-stone-200 transition-colors"
                  >
                    Change Settings
                  </button>
                  <button
                    onClick={generateBoard}
                    className="px-6 py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-colors flex items-center gap-2"
                  >
                    <Icons.RefreshCw className="w-5 h-5" />
                    Play Again
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
